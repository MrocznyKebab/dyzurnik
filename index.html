<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dyżurnik</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <aside class="sidebar">
    <h1>Dyżurnik</h1>
    <nav>
      <button id="nav-dashboard" class="active">Rejestr dyżurów</button>
      <button id="nav-form">Dodaj dyżur</button>
      <button id="nav-settings">Ustawienia</button>
    </nav>
    <button id="theme-toggle" style="margin-top: auto; background: transparent; border: 1px solid var(--text-muted); color: var(--text-light); padding: 10px; cursor: pointer; border-radius: 6px;">Tryb ciemny 🌙</button>
  </aside>

  <main class="app">
    <section id="dashboard" class="view">
      <h2>Rejestr dyżurów</h2>

      <div class="summary">
        <div class="tile">Godziny stacjonarne: <br><strong id="sum-stat">0 h</strong></div>
        <div class="tile">Pod telefonem: <br><strong id="sum-call">0 h</strong></div>
        <div class="tile">Łącznie godzin: <br><strong id="sum-total">0 h</strong></div>
        <div class="tile">Do wypłaty: <br><strong id="sum-pay">0 zł</strong></div>
      </div>

      <div id="duties-list" class="list-container">
        </div>
    </section>

    <section id="duty-form" class="view hidden">
      <h2 id="form-title">Dodaj dyżur</h2>
      
      <form id="form-add-duty">
        <input type="hidden" id="duty-id">
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="duty-date" required>
        </div>
        <div class="form-group row">
          <div>
            <label>Rozpoczęcie</label>
            <input type="time" id="duty-start" required>
          </div>
          <div>
            <label>Zakończenie</label>
            <input type="time" id="duty-end" required>
          </div>
        </div>
        <div class="form-group">
          <label>Miejsce pracy</label>
          <select id="duty-workplace" required>
            </select>
        </div>
        <div class="form-group row">
          <div>
            <label>Godz. stacjonarne</label>
            <input type="number" step="0.5" id="duty-stat" required>
          </div>
          <div>
            <label>Godz. pod telefonem</label>
            <input type="number" step="0.5" id="duty-call" required>
          </div>
        </div>
        <button type="submit" class="btn-primary">Zapisz dyżur</button>
      </form>
    </section>

    <section id="settings" class="view hidden">
      <h2>Ustawienia</h2>

      <div class="settings-card">
        <h3>Wygląd aplikacji</h3>
        <label>
          <input type="checkbox" id="theme-toggle"> 
          Włącz ciemny motyw (Dark Mode)
        </label>
      </div>

      <div class="settings-card">
        <h3>Dodaj miejsce pracy</h3>
        <form id="form-add-workplace" class="row">
          <input type="text" id="wp-name" placeholder="Nazwa miejsca" required>
          <input type="number" id="wp-stat-rate" placeholder="Stawka stacjonarna (zł/h)" required>
          <input type="number" id="wp-call-rate" placeholder="Stawka pod tel (zł/h)" required>
          <button type="submit" class="btn-primary">Dodaj</button>
        </form>
      </div>

      <div id="workplaces-list" class="list-container">
        </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
